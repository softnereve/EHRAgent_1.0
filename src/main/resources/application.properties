# EHRAgent Configuration
spring.application.name=ehr-agent
server.port=8282
server.servlet.context-path=/v1.0.0/apis/epic/

# MongoDB configuration (provide via environment)
spring.data.mongodb.uri=${MONGODB_URI:}
spring.data.mongodb.database=${MONGODB_DATABASE:ehr_agent_db}

# Epic Configuration
epic.client-id=${EPIC_CLIENT_ID:}
epic.kid=${EPIC_KID:}
epic.token-url=${EPIC_TOKEN_URL:https://fhir.epic.com/interconnect-fhir-oauth/oauth2/token}
epic.fhir-base=${EPIC_FHIR_BASE:https://fhir.epic.com/interconnect-fhir-oauth/api/FHIR/R4}
epic.patient-id=${EPIC_PATIENT_ID:}

epic.private-jwk=${EPIC_PRIVATE_JWK:}

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Security Configuration for Swagger
spring.security.user.name=${SWAGGER_USER:patient-service}
spring.security.user.password=${SWAGGER_PASSWORD:}
