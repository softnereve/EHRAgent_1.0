<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verification Successful</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #4caf50;
            color: #fff;
            padding: 20px;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin: 0;
        }
        .content {
            padding: 20px;
            color: #333;
        }
        p {
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .footer {
            background-color: #4caf50;
            color: #fff;
            padding: 10px 20px;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Account Verification Successful</h1>
    </div>
    <div class="content">
        <p>Dear <span th:text="${patientFirstName}">[Patient First Name]</span>,</p>
        <p>Your account has been successfully verified.</p>
        <p>Thank you for registering with us.</p>
    </div>
    <div class="footer">
        <p>If you have any questions or need assistance, please contact us at healthbuddy@softenerve.com</p>
    </div>
</div>
</body>
</html>
